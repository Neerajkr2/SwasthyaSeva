<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── SEO / Identity ──────────────────────────────────────────────────── -->
  <title>SwasthyaSeva — AI Health Intelligence</title>
  <meta name="description" content="Understand your health in simple words. AI-powered support for symptoms, reports, and medicine safety — built for every family." />

  <!-- ── Favicon (with cache-busting query so updates show immediately) ──── -->
  <link rel="icon"             type="image/svg+xml" href="/favicon.svg?v=3" />
  <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.svg?v=3" />
  <link rel="mask-icon"        href="/safari-pinned-tab.svg?v=3" color="#0F4C81" />
  <link rel="manifest"         href="/site.webmanifest" />

  
  <!-- ── Browser-chrome theming (mobile + PWA) ───────────────────────────── -->
  <meta name="theme-color"                          content="#0F4C81" />
  <meta name="msapplication-TileColor"              content="#0F4C81" />
  <meta name="apple-mobile-web-app-capable"         content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title"           content="SwasthyaSeva" />

  <!-- ── Open Graph / Twitter Cards ─────────────────────────────────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="SwasthyaSeva — AI Health Intelligence" />
  <meta property="og:description" content="Understand your health in simple words. AI-powered support for symptoms, reports, and medicine safety." />
  <meta property="og:image"       content="/apple-touch-icon.svg" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="SwasthyaSeva — AI Health Intelligence" />
  <meta name="twitter:description" content="Understand your health in simple words." />

  <!-- ── Fonts (preconnect for performance) ──────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
