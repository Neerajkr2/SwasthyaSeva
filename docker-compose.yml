# docker-compose.yml — Full stack: PostgreSQL + FastAPI + React (dev)
version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: swasthyaseva_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       swasthyaseva
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swasthyaseva_api
    restart: unless-stopped
    environment:
      DATABASE_URL:              postgresql+asyncpg://postgres:password@db:5432/swasthyaseva
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      ANTHROPIC_API_KEY:         ${ANTHROPIC_API_KEY}
      RECAPTCHA_SECRET_KEY:      ${RECAPTCHA_SECRET_KEY}
      JWT_SECRET_KEY:            ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS:           http://localhost:3000
      ML_MODELS_DIR:             /app/ml/saved_models
    volumes:
      - ./backend:/app
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: swasthyaseva_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL:         http://localhost:8000
      VITE_FIREBASE_API_KEY:     ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID:  ${VITE_FIREBASE_PROJECT_ID}
      VITE_RECAPTCHA_SITE_KEY:   ${VITE_RECAPTCHA_SITE_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
